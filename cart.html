<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang - ApotekSehat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --pink-primary: #e84393; --pink-light: #ff7eb3; --pink-dark: #c44569; --pink-bg: #fff0f6; }
        .bg-pink-gradient { background: linear-gradient(135deg, var(--pink-light) 0%, var(--pink-primary) 100%); }
        .btn-pink { background: var(--pink-primary); color: white; border: none; }
        .btn-pink:hover { background: var(--pink-dark); color: white; }
        .text-pink { color: var(--pink-primary) !important; }
        .nav-link.active { color: var(--pink-primary) !important; font-weight: 600; }
        footer { background-color: #2d3436; }
        #cart-count { font-size: 0.75rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-heart-pulse"></i> ApotekSehat</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Tentang Kami</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Layanan</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Produk Obat</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Tips Kesehatan</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Kontak</a></li>
                    <li class="nav-item ms-2">
                        <a class="nav-link position-relative active" href="cart.html">
                            <i class="bi bi-cart3 fs-5"></i> Keranjang
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-count">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="bg-pink-gradient text-white text-center py-4">
        <div class="container">
            <h1 class="display-6">🛒 Keranjang Belanja</h1>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <div id="cart-items">
                                <!-- Rendered by JS -->
                            </div>
                            <div id="empty-cart" class="text-center py-5 d-none">
                                <i class="bi bi-cart-x display-1 text-muted"></i>
                                <h4 class="mt-3">Keranjang Kosong</h4>
                                <a href="products.html" class="btn btn-pink mt-2">Belanja Obat Sekarang</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card shadow-sm sticky-top" style="top: 80px; z-index: 9;">
                        <div class="card-body">
                            <h5 class="mb-3">Ringkasan Pesanan</h5>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Subtotal</span>
                                <span id="subtotal">Rp 0</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Ongkir</span>
                                <span class="text-success">Gratis</span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between fw-bold fs-5">
                                <span>Total</span>
                                <span class="text-pink" id="total">Rp 0</span>
                            </div>
                            <button id="btn-checkout" class="btn btn-pink w-100 mt-4" onclick="location.href='checkout.html'" disabled>
                                Lanjut Pembayaran <i class="bi bi-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-white py-4">
        <div class="container text-center"><p class="mb-0">&copy; 2026 ApotekSehat. All rights reserved.</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const CART_KEY = 'apotekCart';
        function getCart() { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
        function saveCart(cart) { localStorage.setItem(CART_KEY, JSON.stringify(cart)); updateUI(); }
        function formatIDR(price) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(price); }

        function updateUI() {
            const cart = getCart();
            const badge = document.getElementById('cart-count');
            if(badge) badge.textContent = cart.reduce((sum, i) => sum + i.quantity, 0);

            const container = document.getElementById('cart-items');
            const empty = document.getElementById('empty-cart');
            const checkoutBtn = document.getElementById('btn-checkout');

            if (cart.length === 0) {
                container.innerHTML = '';
                empty.classList.remove('d-none');
                document.getElementById('subtotal').textContent = 'Rp 0';
                document.getElementById('total').textContent = 'Rp 0';
                checkoutBtn.disabled = true;
                return;
            }

            empty.classList.add('d-none');
            checkoutBtn.disabled = false;

            let html = '<div class="table-responsive"><table class="table align-middle">';
            html += '<thead><tr><th>Produk</th><th>Harga</th><th>Jumlah</th><th>Subtotal</th><th>Aksi</th></tr></thead><tbody>';

            let total = 0;
            cart.forEach(item => {
                const sub = item.price * item.quantity;
                total += sub;
                html += `<tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${formatIDR(item.price)}</td>
                    <td>
                        <div class="input-group input-group-sm" style="width:120px;">
                            <button class="btn btn-outline-secondary" onclick="changeQty('${item.id}', -1)">-</button>
                            <input type="text" class="form-control text-center" value="${item.quantity}" readonly>
                            <button class="btn btn-outline-secondary" onclick="changeQty('${item.id}', 1)">+</button>
                        </div>
                    </td>
                    <td class="text-pink fw-bold">${formatIDR(sub)}</td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="removeItem('${item.id}')"><i class="bi bi-trash"></i></button></td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
            document.getElementById('subtotal').textContent = formatIDR(total);
            document.getElementById('total').textContent = formatIDR(total);
        }

        function changeQty(id, delta) {
            let cart = getCart();
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
                saveCart(cart);
            }
        }
        function removeItem(id) {
            let cart = getCart().filter(i => i.id !== id);
            saveCart(cart);
        }
        document.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>
</html>
